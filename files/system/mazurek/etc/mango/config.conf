# mazurek's default mangowc config.
# by yours truly, ~sneexy
#
#              ~ helpful links ~
# mangowc                  https://github.com/DreamMaoMao/mango/wiki/
# noctalia shell           https://docs.noctalia.dev/
# mangowc's website        https://mangowc.vercel.app/
# defauly mango config     https://github.com/DreamMaoMao/mangowc/blob/main/config.conf

# enable our desktop portal as wlr, and start mango's hook *before* anything else
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=wlroots
exec-once=systemctl --user start mangowc.target

# configurations
source=/usr/share/mazurek/mango/environment.conf # environment variables
source=/usr/share/mazurek/mango/inputs.conf # inputs

source=/usr/share/mazurek/mango/layout.conf # window management layout
source=/usr/share/mazurek/mango/appearance.conf # global appearance

#source=/usr/share/mazurek/mango/fixes.conf # random fixes
source=/usr/share/mazurek/mango/misc.conf # misc settings
