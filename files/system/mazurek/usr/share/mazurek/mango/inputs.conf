# ╭───────────────╮
# │ device inputs │
# ╰───────────────╯
# 📖 https://github.com/DreamMaoMao/mangowc/wiki#key-bindings

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=1
xkb_rules_layout=us

# trackpad settings
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
mouse_natural_scrolling=0

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=CTRL+SUPER,r,reload_config

# menu
bind=SUPER,space,spawn,qs -c noctalia-shell ipc call launcher toggle
# terminal
bind=SUPER,Return,spawn,wezterm
# lock screen
bind=SUPER,l,spawn,qs -c noctalia-shell ipc call lockScreen lock
# session manager
bind=SUPER,Escape,spawn,qs -c noctalia-shell ipc call sessionMenu toggle
# quit applications
bind=SUPER,q,killclient,

# emoji picker
bind=SUPER,period,spawn,qs -c noctalia-shell ipc call launcher emoji
# clipboard
bind=SUPER,v,spawn,qs -c noctalia-shell ipc call launcher clipboard

# volume keys
bindl=NONE,XF86AudioRaiseVolume,spawn,qs -c noctalia-shell ipc call volume increase
bindl=NONE,XF86AudioLowerVolume,spawn,qs -c noctalia-shell ipc call volume decrease
bindl=NONE,XF86AudioMute,spawn,qs -c noctalia-shell ipc call volume muteOutput
bindl=NONE,XF86AudioMicMute,spawn,qs -c noctalia-shell ipc call volume muteInput

# media keys
bindl=NONE,XF86AudioPlay,spawn,qs -c noctalia-shell ipc call media playPause
bindl=NONE,XF86AudioStop,spawn,playerctl stop
bindl=NONE,XF86AudioPrev,spawn,qs -c noctalia-shell ipc call media previous
bindl=NONE,XF86AudioNext,spawn,qs -c noctalia-shell ipc call media next
bindl=NONE,XF86MonBrightnessUp,spawn,qs -c noctalia-shell ipc call brightness increase
bindl=NONE,XF86MonBrightnessDown,spawn,qs -c noctalia-shell ipc call brightness decrease

# switch window focus
bind=ALT,Tab,focusstack,next
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# swap window
bind=SUPER+CTRL,Up,exchange_client,up
bind=SUPER+CTRL,Down,exchange_client,down
bind=SUPER+CTRL,Left,exchange_client,left
bind=SUPER+CTRL,Right,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal,
bind=SUPER,Tab,toggleoverview,
bind=SUPER+CTRL,f,togglefloating,
bind=SUPER,f,togglemaximizescreen,
bind=SUPER+SHIFT,f,togglefullscreen,
bind=SUPER+CTRL+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,

# switch layout
bind=SUPER,n,switch_layout

# tag switch
bind=SUPER,Left,viewtoleft,0
bind=CTRL,Left,viewtoleft_have_client,0
bind=SUPER,Right,viewtoright,0
bind=CTRL,Right,viewtoright_have_client,0
bind=CTRL+SUPER,Left,tagtoleft,0
bind=CTRL+SUPER,Right,tagtoright,0

bind=Ctrl,1,view,1,0
bind=Ctrl,2,view,2,0
bind=Ctrl,3,view,3,0
bind=Ctrl,4,view,4,0
bind=Ctrl,5,view,5,0
bind=Ctrl,6,view,6,0
bind=Ctrl,7,view,7,0
bind=Ctrl,8,view,8,0
bind=Ctrl,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=Alt,1,tag,1,0
bind=Alt,2,tag,2,0
bind=Alt,3,tag,3,0
bind=Alt,4,tag,4,0
bind=Alt,5,tag,5,0
bind=Alt,6,tag,6,0
bind=Alt,7,tag,7,0
bind=Alt,8,tag,8,0
bind=Alt,9,tag,9,0

# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize


# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client
