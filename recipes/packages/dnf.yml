modules:
  - type: dnf
    repos:
      cleanup: true
      nonfree: negativo17
      copr:
        - sneexy/zen-browser
        - wezfurlong/wezterm-nightly
        - wojnilowicz/ungoogled-chromium
      files:
        - https://download.opensuse.org/repositories/home:mkittler/Fedora_Rawhide/home:mkittler.repo # hardcoded version because they take a while to bump to latest fedora when it releases
        - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
        - https://pkgs.tailscale.com/stable/fedora/tailscale.repo
        - https://repository.mullvad.net/rpm/stable/mullvad.repo
    install:
      skip-unavailable: true
      packages:
        # web
        - firefox
        - mullvad-vpn
        - speedtest-cli
        - thunderbird
        - torbrowser-launcher
        - ungoogled-chromium

        # misc
        - age
        - docker-compose
        - mpv
        - nextcloud-client
        - patch
        - pipx
        - steam
        - syncthing
        - tailscale
        - topgrade
        - wev
        - zed

        # beets
        - beets
        - beets-doc
        - beets-plugins
        - chromaprint-tools
        - python3-acoustid
        - python3-pylast
        - python3-requests

        # flacconv
        - flac
        - lame
        - opus-tools
        - opustags

        # environment
        - crontabs
        - gamescope
        - helvum
        - mangohud
        - playerctl
        - trash-cli
        - wl-clipboard

        # python modules
        - python3-colorama
        - python3-dateutil
        - python3-dbus
        - python3-gobject

        # themes
        - bibata-cursor-theme
        - pop-sound-theme

        # virtualization
        - edk2-ovmf
        - genisoimage
        - libvirt
        - qemu
        - qemu-char-spice
        - qemu-device-display-virtio-gpu
        - qemu-device-display-virtio-vga
        - qemu-device-usb-redirect
        - qemu-img
        - qemu-system-x86-core
        - qemu-user-binfmt
        - qemu-user-static
        - virt-manager

        # android
        - android-tools
        - waydroid

        # music
        #- https://github.com/patryk-ku/music-discord-rpc/releases/latest/download/music-discord-rpc.rpm
        - ncmpcpp
        - rmpc

        # cli
        - atuin
        - bat
        - btop
        - cava
        - duf
        - eza
        - fastfetch
        - fd-find
        - ffmpeg
        - figlet
        - fzf
        - knock
        - krabby
        - neovim
        - ripgrep
        - starship
        - wezterm
        - yt-dlp
        - zoxide
        - zsh

        # syncthing
        - syncthingctl-qt6
        - syncthingfileitemaction-qt6
        - syncthingtray-qt6

        # other
        - ImageMagick
        - fontconfig
        - genisoimage
        - gnome-themes-extra
        - hunspell-en
        - iwd
        - libguestfs
        - lzip
        - net-tools
        - p7zip
        - podlet
        - rsms-inter-fonts
        - screen
        - tesseract
        - unrar
        - util-linux

  - type: dnf
    repos:
      cleanup: true
      nonfree: rpmfusion
    install:
      skip-unavailable: true
      packages:
        - mpd
