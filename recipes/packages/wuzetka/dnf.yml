type: dnf
repos:
  cleanup: true
  nonfree: negativo17
  copr:
    - deltacopy/darkly
    - matinlotfali/KDE-Rounded-Corners
  files:
    - https://download.opensuse.org/repositories/home:mkittler/Fedora_43/home:mkittler.repo # hardcoded version because they take a while to bump to latest fedora when it releases
    - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
install:
  skip-unavailable: true
  packages:
    # "Office"
    - merkuro

    # environment
    - pavucontrol-qt

    # themes
    - darkly
    - oxygen-sounds

    # kde
    - ark
    - dolphin-plugins
    - filelight
    - gwenview
    - isoimagewriter
    - k3b
    - kalk
    - kamoso
    - kate
    - kclock
    - kfind
    - kompare
    - krecorder
    - ksystemlog
    - kweather
    - kwin-effect-roundcorners
    - nextcloud-client-dolphin
    - okular
    - syncthingctl-qt6
    - syncthingfileitemaction-qt6
    - syncthingplasmoid-qt6
    - syncthingtray-qt6

    # kde libraries
    - ffmpegthumbs
    - kaccounts-integration
    - kaccounts-providers
    - kdepim
    - kdepim-addons
    - qt6-qt5compat
    - qt6-qtdeclarative
    - qt6-qtlocation
    - qt6-qtsvg
    - translate-shell
