type: dnf
repos:
  cleanup: true
  nonfree: negativo17
  files:
    - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
    - https://download.opensuse.org/repositories/home:mkittler/Fedora_43/home:mkittler.repo # hardcoded version because they take a while to bump to latest fedora when it releases
install:
  skip-unavailable: true
  packages:
    # shell
    - noctalia-shell
    - plasma-workspace # better compatibility with kde/qt applications

    # utilities
    - ark
    - dolphin
    - dolphin-plugins
    - kate
    - kde-connect

    # syncthing
    - syncthingctl-qt6
    - syncthingfileitemaction-qt6
    - syncthingtray-qt6

    # themes
    - adw-gtk3-theme
    - nwg-look
    - plasma-breeze
    - qt5ct
    - qt6ct

    # extra
    - cliphist
    - gnome-keyring
    - gnome-keyring-pam
    - matugen
    - sway-audio-idle-inhibit
    - swayidle
