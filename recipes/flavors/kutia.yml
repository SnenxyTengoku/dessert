---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: kutia
description: sneexy's personal and opinionated fedora mangowc image

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/snenxytengoku/base-images/mangowc
image-version: 43 # latest is also supported if you want new updates ASAP

modules:
  # packages
  - from-file: packages/dnf.yml # base package selection
  - from-file: packages/flatpaks.yml # base default flatpaks
  - from-file: packages/mazurek/dnf.yml # mazurek package selection - package selection so far is shared between mazurek and kutia
  - from-file: packages/mazurek/flatpaks.yml # mazurek flatpak flatpaks - ditto

  # pre-run
  - from-file: shared/files.yml # shared base filesystem
  - from-file: shared/scripts.yml # default scripts selection

  # mazurek files
  - type: files
    files:
      - source: system/kutia
        destination: /

  # copy files and software from helper images
  - type: containerfile
    snippets:
      # -- wayland wm utils
      #- COPY --from=ghcr.io/snenxytengoku/helper-wmutils /artifacts/usr /usr
      # -- cargo
      - COPY --from=ghcr.io/snenxytengoku/helper-cargo /artifacts/usr /usr
      # -- go
      #- COPY --from=ghcr.io/snenxytengoku/helper-go /artifacts/usr /usr

  - type: script
    scripts:
      # customization
      - additions/sddm-astronaut-theme.sh
      # ---
      - flavors/kutia.sh

  # post-run
  - from-file: shared/fonts.yml # fonts
  - from-file: shared/bling.yml # ublue bling selection
  - from-file: shared/systemd.yml # default systemd services

  # enable noctalia shell
  - type: systemd
    user:
      enabled:
        - kanshi.service
        - noctalia-mango.service
        - swayidle-mango.service

  #- type: gschema-overrides
  #  include:
  #    - zz1-wuzetka.gschema.override

  - type: signing
